apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ include "granite-3-3-8b.fullname" . }}
  labels:
    {{- include "granite-3-3-8b.labels" . | nindent 4 }}
    opendatahub.io/dashboard: 'true'
    monitoring.opendatahub.io/scrape: 'true'
    opendatahub.io/genai-asset: 'true'
  annotations:
    openshift.io/display-name: {{ .Values.inferenceService.displayName | default "granite-3.3-8b" }}
    serving.knative.openshift.io/enablePassthrough: 'true'
    {{- if and .Values.keda.enabled .Values.httpAddon.enabled }}
    # HTTP Add-on handles scaling - use external autoscaler (KEDA)
    # See: https://developers.redhat.com/articles/2025/09/23/how-set-kserve-autoscaling-vllm-keda
    serving.kserve.io/autoscalerClass: external
    {{- else if .Values.keda.enabled }}
    # Prometheus-based KEDA autoscaling (1→N only)
    serving.kserve.io/autoscalerClass: keda
    {{- end }}
    serving.kserve.io/deploymentMode: {{ .Values.inferenceService.deploymentMode | default "RawDeployment" }}
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
  finalizers:
    - serving.kserve.io/inferenceservice-finalizer
spec:
  predictor:
    automountServiceAccountToken: {{ .Values.inferenceService.automountServiceAccountToken | default false }}
    deploymentStrategy:
      type: RollingUpdate
    {{- if and .Values.keda.enabled .Values.httpAddon.enabled }}
    # HTTP Add-on handles scaling - allow scale-to-zero
    maxReplicas: {{ .Values.httpAddon.maxReplicas | default (.Values.inferenceService.maxReplicas | default 3) }}
    minReplicas: {{ .Values.httpAddon.minReplicas | default 0 }}
    {{- else }}
    maxReplicas: {{ .Values.inferenceService.maxReplicas | default 1 }}
    minReplicas: {{ .Values.inferenceService.minReplicas | default 1 }}
    {{- end }}
    {{- if and .Values.keda.enabled (not .Values.httpAddon.enabled) }}
    # Prometheus-based autoscaling (only when HTTP Add-on is disabled)
    autoScaling:
      metrics:
        - type: External
          external:
            metric:
              backend: "prometheus"
              serverAddress: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
              query: >
                {{ .Values.keda.query | default "sum(vllm:num_requests_waiting{model_name=\"granite-8b\"})" }}
            target:
              type: Value
              value: {{ .Values.keda.threshold | default 2 }}
            authenticationRef:
              authModes: bearer
              authenticationRef:
                name: inference-prometheus-auth
    {{- end }}
    model:
      args:
        - '--served-model-name={{ .Values.servingRuntime.servedModelName | default "granite-8b" }}'
        {{- if .Values.model.disableLogRequests }}
        - '--disable-log-requests'
        {{- end }}
        - '--max-num-seqs={{ .Values.model.maxNumSeqs | default 32 }}'
        - '--max-model-len={{ .Values.model.maxModelLen | default 2048 }}'
      modelFormat:
        name: {{ .Values.inferenceService.modelFormat | default "vLLM" }}
      name: {{ .Values.inferenceService.modelName | default "" }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      runtime: {{ .Values.inferenceService.runtime | default (include "granite-3-3-8b.fullname" .) }}
      storageUri: {{ .Values.inferenceService.storageUri | default "oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.3-8b-instruct" }}
    tolerations:
      {{- toYaml .Values.tolerations | nindent 6 }}
    nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 6 }}
