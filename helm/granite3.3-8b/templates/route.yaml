apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "granite-3-3-8b.fullname" . }}
  labels:
    {{- include "granite-3-3-8b.labels" . | nindent 4 }}
  annotations:
    openshift.io/display-name: {{ .Values.inferenceService.displayName | default "granite-3.3-8b" }}
spec:
  host: ""
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: {{ include "granite-3-3-8b.fullname" . }}-predictor
    weight: 100
  wildcardPolicy: None
