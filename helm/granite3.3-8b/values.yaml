# Default values for granite3.3-8b

# Resource requirements
resources:
  limits:
    nvidia.com/gpu: 1
    memory: 16Gi
    cpu: 2
  requests:
    nvidia.com/gpu: 1
    memory: 8Gi
    cpu: 2

# KEDA Autoscaling Configuration (Prometheus-based, 1→N scaling)
keda:
  enabled: false
  threshold: 2
  query: 'sum(vllm:num_requests_waiting{model_name="granite-8b"})'

# HTTP Add-on for scale-to-zero (requires keda.enabled=true)
# Enables 0→N scaling using KEDA HTTP Add-on interceptor
httpAddon:
  enabled: false
  # Required: Route hostname (e.g., granite3-3-8b-llm.apps.cluster.example.com)
  host: ""
  # Path prefixes to apply scaling rule
  pathPrefixes:
    - /v1
  # Scaling configuration
  minReplicas: 0
  maxReplicas: 3
  scaledownPeriod: 300  # 5 minutes before scaling to zero
  targetValue: 2        # Scale up at 2 req/s per replica
  granularity: "1s"
  window: "1m"
  # KEDA namespace where HTTP Add-on is installed
  kedaNamespace: openshift-keda
  # Optional: Interceptor ClusterIP (auto-detected if empty)
  # Use this if helm template fails or for GitOps workflows
  # Get with: oc get svc keda-add-ons-http-interceptor-proxy -n openshift-keda -o jsonpath='{.spec.clusterIP}'
  interceptorIP: ""

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Equal
    value: "True"

# Model configuration
model:
  maxModelLen: 2048
  maxNumSeqs: 32
  disableLogRequests: true

# InferenceService configuration
inferenceService:
  displayName: "granite-3.3-8b"
  maxReplicas: 3
  minReplicas: 1
  modelFormat: "vLLM"
  modelName: ""
  storageUri: "oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.3-8b-instruct"
  deploymentMode: "RawDeployment"
  automountServiceAccountToken: false

# Serving Runtime configuration
servingRuntime:
  image: "registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a"
  servedModelName: "granite-8b"
