{{- if and .Values.keda.enabled .Values.httpAddon.enabled }}
---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: {{ include "llama3-2-3b.fullname" . }}
  labels:
    {{- include "llama3-2-3b.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ required "httpAddon.host is required when httpAddon.enabled=true" .Values.httpAddon.host }}
  pathPrefixes:
    {{- if .Values.httpAddon.pathPrefixes }}
    {{- range .Values.httpAddon.pathPrefixes }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    - /v1
    {{- end }}
  scaleTargetRef:
    name: {{ include "llama3-2-3b.fullname" . }}-predictor
    kind: Deployment
    apiVersion: apps/v1
    service: {{ include "llama3-2-3b.fullname" . }}-predictor
    port: 8080
  replicas:
    min: {{ .Values.httpAddon.minReplicas | default 0 }}
    max: {{ .Values.httpAddon.maxReplicas | default (.Values.inferenceService.maxReplicas | default 3) }}
  scaledownPeriod: {{ .Values.httpAddon.scaledownPeriod | default 300 }}
  scalingMetric:
    concurrency:
      targetValue: {{ .Values.httpAddon.concurrencyTargetValue | default 1 }}
  {{- if .Values.httpAddon.coldStartCallback.enabled }}
  coldStartStreamingCallback:
    message: {{ .Values.httpAddon.coldStartCallback.message | quote }}
    keepaliveMessage: {{ .Values.httpAddon.coldStartCallback.keepaliveMessage | default "" | quote }}
    intervalSeconds: {{ .Values.httpAddon.coldStartCallback.intervalSeconds | default 5 }}
  {{- end }}
{{- end }}
