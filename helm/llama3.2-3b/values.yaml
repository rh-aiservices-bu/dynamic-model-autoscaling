# Default values for llama3.2-3b

# Resource requirements
resources:
  limits:
    nvidia.com/gpu: 1
    memory: 20Gi
    cpu: 4
  requests:
    nvidia.com/gpu: 1
    memory: 8Gi
    cpu: 1

# KEDA Autoscaling Configuration (Prometheus-based, 1→N scaling)
keda:
  enabled: false
  threshold: 2
  query: 'sum(vllm:num_requests_waiting{model_name="llama3-2-3b"})'

# HTTP Add-on for scale-to-zero (requires keda.enabled=true)
# Enables 0→N scaling using KEDA HTTP Add-on interceptor
httpAddon:
  enabled: false
  # Required: Route hostname (e.g., llama3-2-3b-llm.apps.cluster.example.com)
  host: ""
  # Path prefixes to apply scaling rule
  pathPrefixes:
    - /v1
  # Scaling configuration
  minReplicas: 0
  maxReplicas: 3
  scaledownPeriod: 600  # 10 minutes before scaling to zero
  concurrencyTargetValue: 1  # Scale up when 1 concurrent request per replica
  # KEDA namespace where HTTP Add-on is installed
  kedaNamespace: openshift-keda
  # Optional: Interceptor ClusterIP (auto-detected if empty)
  # Use this if helm template fails or for GitOps workflows
  # Get with: oc get svc keda-add-ons-http-interceptor-proxy -n openshift-keda -o jsonpath='{.spec.clusterIP}'
  interceptorIP: ""
  # Cold start streaming callback (requires custom interceptor with callback support)
  # Sends SSE keepalive events to streaming clients while the model loads from zero
  coldStartCallback:
    enabled: false
    message: "Model is waking up, hold on..."
    keepaliveMessage: "."
    intervalSeconds: 5

# Model configuration
model:
  maxModelLen: 100000
  maxNumSeqs: 20

nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations:
  - effect: NoSchedule
    key: nvidia.com/gpu
    operator: Equal
    value: l40-gpu

# InferenceService configuration
inferenceService:
  displayName: "llama3.2-3b"
  maxReplicas: 3
  minReplicas: 1
  modelFormat: "vLLM"
  modelName: ""
  storageUri: "oci://quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-3b-instruct"

# Serving Runtime configuration
servingRuntime:
  image: "registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:094db84a1da5e8a575d0c9eade114fa30f4a2061064a338e3e032f3578f8082a"
  servedModelName: "llama3-2-3b"
